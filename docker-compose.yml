services:
  db:
    image: mysql:8.0
    container_name: profile-mysql
    environment:
      MYSQL_DATABASE: profile
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: nhqminh/demojava
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profile-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/profile?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "app"
      SPRING_DATASOURCE_PASSWORD: "app"
      UPLOAD_PATH: "/app/uploads/"
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:
