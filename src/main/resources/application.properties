spring.application.name=nguyenhuynhquangminh

# Cấu hình kết nối MySQL Laragon
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/profile?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

app.db.enabled=${APP_DB_ENABLED:true}

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.path=${UPLOAD_PATH:uploads/}

contact.mail.enabled=${CONTACT_MAIL_ENABLED:false}
contact.receiver.email=${CONTACT_RECEIVER_EMAIL:}
contact.subject.prefix=${CONTACT_SUBJECT_PREFIX:[Contact]}
contact.min-interval-seconds=${CONTACT_MIN_INTERVAL_SECONDS:30}
