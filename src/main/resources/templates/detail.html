<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Profile: ' + ${person.name}">Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .detail-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width: 768px) {
            .detail-card {
                flex-direction: row;
            }
        }
        .edit-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        .edit-toggle-btn:hover {
            background: #2980b9;
        }
        .image-section {
            width: 100%;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        @media (min-width: 768px) {
            .image-section {
                width: 35%;
            }
        }
        .detail-image {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .detail-content {
            padding: 40px;
            flex: 1;
        }
        /* View Mode Styles */
        .view-mode h1 {
            font-size: 2.8rem;
            color: #2c3e50;
            margin: 0 0 20px 0;
        }
        .info-item {
            margin-bottom: 25px;
        }
        .info-label {
            display: block;
            color: #7f8c8d;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 1.2rem;
            color: #34495e;
            font-weight: 500;
        }
        .bio {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #2c3e50;
            padding-top: 25px;
            border-top: 1px solid #eee;
            margin-top: 25px;
        }
        /* Edit Mode Styles (Hidden by default) */
        .edit-mode {
            display: none;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: opacity 0.3s;
        }
        .save-btn { background: #2ecc71; color: white; }
        .cancel-btn { background: #95a5a6; color: white; }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="detail-card">
        <!-- Edit Toggle Button -->
        <button class="edit-toggle-btn" id="toggleBtn" onclick="toggleEditMode()">✎ Sửa Profile</button>

        <div class="image-section">
            <img th:src="${person.imageUrl != null ? person.imageUrl : 'https://via.placeholder.com/220'}" alt="Avatar" class="detail-image" id="profilePic"/>
            <p style="margin-top: 15px; color: #7f8c8d; font-weight: 500;" th:text="${person.name}">Tên</p>
        </div>
        
        <div class="detail-content">
            <!-- VIEW MODE -->
            <div class="view-mode" id="viewSection">
                <h1 th:text="${person.name}">Họ Tên</h1>
                
                <div class="info-item">
                    <span class="info-label">Email</span>
                    <span class="info-value" th:text="${person.email}">email@example.com</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">MSSV</span>
                    <span class="info-value" th:text="${person.phone}">0123456789</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">Địa chỉ</span>
                    <span class="info-value" th:text="${person.address}">Địa chỉ</span>
                </div>
                
                <div class="bio" th:text="${person.description}">
                    Mô tả...
                </div>
                
                <a href="/" class="back-link">← Quay lại danh sách</a>
            </div>

            <!-- EDIT MODE -->
            <div class="edit-mode" id="editSection">
                <h2 style="margin-top: 0; color: #2c3e50;">Chỉnh sửa thông tin</h2>
                <form th:action="@{/person/update}" th:object="${person}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}"/>
                    <input type="hidden" th:field="*{imageUrl}"/> <!-- Keep URL if file not changed -->
                    
                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <input type="text" th:field="*{name}" required="required"/>
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" required="required"/>
                    </div>
                    
                    <div class="form-group">
                        <label>MSSV</label>
                        <input type="text" th:field="*{phone}"/>
                    </div>
                    
                    <div class="form-group">
                        <label>Địa chỉ</label>
                        <input type="text" th:field="*{address}"/>
                    </div>

                    <div class="form-group">
                        <label>Tải lên ảnh mới (từ máy)</label>
                        <input type="file" name="imageFile" accept="image/*"/>
                    </div>
                    
                    <div class="form-group">
                        <label>Mô tả bản thân</label>
                        <textarea th:field="*{description}"></textarea>
                    </div>
                    
                    <div class="btn-group">
                        <button type="submit" class="btn save-btn">Lưu thay đổi</button>
                        <button type="button" class="btn cancel-btn" onclick="toggleEditMode()">Hủy bỏ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleEditMode() {
            const viewSection = document.getElementById('viewSection');
            const editSection = document.getElementById('editSection');
            const toggleBtn = document.getElementById('toggleBtn');

            if (editSection.style.display === 'none' || editSection.style.display === '') {
                // Switch to Edit Mode
                viewSection.style.display = 'none';
                editSection.style.display = 'block';
                toggleBtn.style.display = 'none';
            } else {
                // Switch to View Mode
                viewSection.style.display = 'block';
                editSection.style.display = 'none';
                toggleBtn.style.display = 'block';
            }
        }
    </script>
</body>
</html>
