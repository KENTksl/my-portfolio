name: Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_IMAGE || format('{0}/demojava', secrets.DOCKER_USERNAME) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker meta (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Tuỳ chọn: gọi webhook triển khai (nếu bạn thực sự cần),
      # tránh làm fail job vì timeout và giới hạn thời gian phản hồi.
      - name: Deploy via webhook (optional)
        if: ${{ secrets.DEPLOY_URL != '' }}
        run: |
          set -e
          REPO="${{ env.IMAGE_NAME }}"
          TAG="latest"
          CONTAINER_PORT="80"
          # Timeout ngắn, không làm fail job nếu server lâu phản hồi
          curl --max-time 20 -sS -X POST \
            "${{ secrets.DEPLOY_URL }}?repo=${REPO}&tag=${TAG}&slot=1&container_port=${CONTAINER_PORT}&strict_container_port=0" \
            -o /tmp/resp.json -w "\n%{http_code}" || true