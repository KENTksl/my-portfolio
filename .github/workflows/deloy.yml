name: Deploy Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # 2. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Build Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/demojava:latest
            ${{ secrets.DOCKER_USERNAME }}/demojava:${{ github.run_number }}
      # 4. CD
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="nhqminh/demojava"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -m 30 -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")

          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP: $CODE"
          
          # Nếu timeout (000 hoặc 524) thì KHÔNG fail
          if [ "$CODE" = "524" ] || [ "$CODE" = "000" ]; then
            echo "⚠️ Webhook bị timeout (có thể deploy vẫn đang chạy)"
            exit 0
          fi
          
          # Nếu lỗi thật thì mới fail
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại."
            exit 1
          fi
          
          echo "Deploy thành công."
